version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost/api/v1}
    container_name: qhay-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - qhay-network

networks:
  qhay-network:
    external: true
